version: "3.8"

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.34.2
    container_name: weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      - "8081:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  api:
    build: .
    container_name: semantic-qa-api
    depends_on:
      - weaviate
      - ollama
    environment:
      WEAVIATE_URL: "http://weaviate:8080"
      OLLAMA_URL: "http://ollama:11434"
      EMBEDDING_MODEL: "embeddinggemma"
      GENERATE_MODEL: "gemma3:4b"
      WEAVIATE_COLLECTION: "BhagavadGitaChunks"
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
    container_name: semantic-qa-web
    depends_on:
      - api
    ports:
      - "3000:80"
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    profiles: ["init"]
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    command: ["sh", "-lc", "ollama pull embeddinggemma && ollama pull gemma3:4b"]
    restart: "no"

volumes:
  weaviate_data:
  ollama_data: